name: Weekly Dream Team Report

on:
  schedule:
    # 매주 금요일 16:00 KST = 07:00 UTC (한국장 마감 후)
    - cron: '0 7 * * 5'
  workflow_dispatch:

concurrency:
  group: weekly-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Korean fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum fontconfig
          fc-cache -fv
          # matplotlib 폰트 캐시 제거 → 다음 실행 시 재빌드
          rm -rf ~/.cache/matplotlib

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore stock cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: .cache
          key: stock-cache-${{ github.run_id }}
          restore-keys: |
            stock-cache-

      - name: Seed cache from stock-cache.zip (first run fallback)
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: |
          echo "캐시 miss — stock-cache.zip에서 시드 복원"
          unzip -q -o stock-cache.zip

      - name: Resolve report date (KST)
        id: date
        run: |
          REPORT_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "report_date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "REPORT_DATE=$REPORT_DATE"

      - name: Run batch pipeline
        env:
          MARKET: ALL
          BATCH_SIZE: '50'
          MAX_CONCURRENT: '3'
          TZ: Asia/Seoul
        run: |
          python -m src.batch

      - name: Verify report was generated
        run: |
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          if [ ! -f "reports/$REPORT_DATE/report.html" ]; then
            echo "::error::리포트 생성 실패: reports/$REPORT_DATE/report.html 없음"
            ls -la reports/ || true
            exit 1
          fi
          du -sh "reports/$REPORT_DATE" || true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Assemble site directory
        run: |
          mkdir -p site
          # 기존 gh-pages 내용 복사 (최초 실행이면 디렉토리 없을 수 있음)
          if [ -d gh-pages ]; then
            # .git 디렉토리는 제외
            find gh-pages -mindepth 1 -maxdepth 1 ! -name '.git' -exec cp -r {} site/ \;
          fi
          # 이번 실행 리포트 병합 (같은 날짜면 덮어쓰기)
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          rm -rf "site/$REPORT_DATE"
          cp -r "reports/$REPORT_DATE" "site/$REPORT_DATE"

      - name: Build index and prune old reports
        run: |
          python scripts/build_index.py --site-dir site --keep 4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          # keep_files=false: build_index.py가 이미 prune 수행 → 전체 교체
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore(report): ${{ steps.date.outputs.report_date }} 주간 리포트 배포'
